<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>502 Bad Gateway</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      padding: 40px;
      max-width: 520px;
    }

    .code {
      font-size: 96px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    p {
      color: #94a3b8;
      font-size: 18px;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      color: #0f172a;
      background: #38bdf8;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="code">502</div>
    <h1>Bad Gateway</h1>
    <p>
      Сервер получил некорректный ответ от upstream-сервиса.
      Возможно, приложение временно недоступно или перезапускается.
    </p>
    <a href="/">На главную</a>
  </main>
</body>
</html>
