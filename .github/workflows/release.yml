name: release

on:
  push:
    tags:
      - 'v*'

env:
  APP_IMAGE_NAME: neutron1985/devops-example-app
  CADDY_IMAGE_NAME: neutron1985/devops-example-caddy

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.APP_IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Build and push caddy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/caddy/Dockerfile
          push: true
          tags: |
            ${{ env.CADDY_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.CADDY_IMAGE_NAME }}:sha-${{ github.sha }}
