---

- hosts: webservers
  gather_facts: no
  tasks:

    - community.docker.docker_network:
        name: devops-example

    - community.docker.docker_container:
        name: app
        # Обязатлеьно указываем тег, который хотим деплоить
        # Если образа на сервере нет, Ansible его автоматически скачает
        image: "neutron1985/devops-example-app:{{ version }}"
        # Подключаем супервизор
        # Если контейнер остановится, например, из-за ошибок
        # супервизор докера его перезапустит
        restart_policy: always
        # Запускаем если не запущен
        state: started
        networks:
          - name: devops-example
        # Делаем доступным снаружи
        ports:
          - "{{ app_port | default(3000) }}:3000"
        env: # Настраиваем
          NODE_ENV: production
          SERVER_MESSAGE: "Hello from {{ inventory_hostname }}"


- hosts: loadbalancers
  gather_facts: no
  vars:
    caddy_config_path: "{{ caddy_config_dir | default('/home/' ~ (ansible_user | default(ansible_ssh_user)) ~ '/devops-example-app/caddy') }}"
  tasks:

    - community.docker.docker_network:
        name: devops-example

    - ansible.builtin.file:
        path: "{{ caddy_config_path }}"
        state: directory
        mode: "0755"

    - ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: "{{ caddy_config_path }}/Caddyfile"
        mode: "0644"
      register: caddy_config

    - community.docker.docker_container:
        name: caddy
        image: "neutron1985/devops-example-caddy:{{ version }}"
        restart_policy: always
        restart: "{{ caddy_config.changed }}"
        state: started
        networks:
          - name: devops-example
        ports: "{{ caddy_ports | default(['80:80']) }}"
        volumes:
          - "{{ caddy_config_path }}/Caddyfile:/etc/caddy/Caddyfile:ro"
